name: GitHub Stats Cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs automatically once a day at midnight
  workflow_dispatch: # Allows you to trigger it manually via the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-cards
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # This custom step automatically deletes all old folders before generating the new ones
      - name: Clean Unused Folders
        run: |
          if [ -d "profile-summary-card-output" ]; then
            echo "Cleaning up old theme folders..."
            # Deletes everything inside the output folder EXCEPT the github_dark folder
            find profile-summary-card-output -maxdepth 1 -mindepth 1 ! -name 'github_dark' -exec rm -rf {} +
          fi
      
      - name: Generate Github Dark Analytics
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: QWavey
          THEME: github_dark
