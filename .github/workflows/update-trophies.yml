name: GitHub Stats Cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs automatically once a day at midnight
  workflow_dispatch: # Allows you to trigger it manually via the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-cards
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      
      - name: Generate All Analytics
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: QWavey
          THEME: github_dark

      # Forcibly remove all other generated theme folders from git before pushing
      - name: Nuke Unused Theme Folders
        run: |
          echo "Intercepting workspace to delete unwanted theme directories..."
          cd profile-summary-card-output
          
          # Delete every directory except 'github_dark'
          find . -maxdepth 1 -mindepth 1 -type d ! -name 'github_dark' -exec rm -rf {} +
          
          # Tell git to track the deletions
          git add -A
          
          # Configure dummy git credentials to apply the deletion commit
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Only commit if there are actually stray folders left to delete
          if ! git diff-index --quiet HEAD; then
            git commit -m "🧹 Scripted clean up of unused themes"
            git push origin HEAD:${{ github.ref }}
          else
            echo "Repository is already clean!"
          fi
